# ================================================
# GitHub Actions - Container Security Scanning
# ================================================
name: Container Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'images/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ----------------------------------------
  # JOB 1 - Build and Scan Container
  # ----------------------------------------
  build-and-scan:
    name: Build and Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f images/secure.Dockerfile \
            -t secure-app:${{ github.sha }} .

      - name: Install Trivy Native CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      # INSURANCE LAYER 1: Pre-seed a valid empty SARIF shell so a file is GUARANTEED to exist
      - name: Generate SARIF Artifact File
        run: |
          echo '{"$schema":"https://json.schemastore.org/sarif-2.1.0-rtm.5.json","version":"2.1.0","runs":[]}' > trivy-results.sarif
          trivy image --format sarif --output trivy-results.sarif secure-app:${{ github.sha }} || true

      # INSURANCE LAYER 2: 'if: always()' guarantees this artifact uploads even if previous steps errored
      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.sarif

      # 3. Final Gate: This step deliberately exits with 1 if vulnerabilities exist, after our file is safe
      - name: Enforce Policy Thresholds
        run: |
          trivy image --severity CRITICAL,HIGH --exit-code 1 secure-app:${{ github.sha }}

  # ----------------------------------------
  # JOB 2 - Dockerfile Security Lint
  # ----------------------------------------
  dockerfile-lint:
    name: Dockerfile Security Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint Dockerfile Linter
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/secure.Dockerfile
          failure-threshold: error

  # ----------------------------------------
  # JOB 3 - Policy Check
  # ----------------------------------------
  policy-check:
    name: Security Policy Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run policy validation
        run: |
          echo "========================================="
          echo "  SECURITY POLICY VALIDATION"
          echo "========================================="
          python -c "
          import json
          with open('policies/security-policy.json') as f:
              policy = json.load(f)
          print('✅ Policy file loaded successfully')
          rules = policy['security_policy']['rules']
          print(f'✅ Vulnerability thresholds: {rules[\"vulnerability_thresholds\"]}')
          print(f'✅ Approved base images: {rules[\"approved_base_images\"]}')
          print('✅ All policy checks passed!')
          "

  # ----------------------------------------
  # JOB 4 - Generate Security Report
  # ----------------------------------------
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    if: always()
    needs: [build-and-scan, dockerfile-lint, policy-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Trivy results from Job 1
        uses: actions/download-artifact@v4
        with:
          name: trivy-scan-results
          path: reports/

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Generate report
        run: python reports/report-generator.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/

      - name: Pipeline Summary
        run: |
          echo "========================================="
          echo "   CONTAINER SECURITY PIPELINE DONE"
          echo "========================================="
          echo "✅ Image Build          - Complete"
          echo "✅ Vulnerability Scan   - Complete"
          echo "✅ Dockerfile Lint      - Complete"
          echo "✅ Policy Check         - Complete"
          echo "✅ Security Report      - Generated"
          echo "========================================="