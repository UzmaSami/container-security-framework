# ================================================
# GitHub Actions - Container Security Scanning
# ================================================
name: Container Security Scan

on:
  push:
    branches: [ main ]
    paths:
      - 'images/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ----------------------------------------
  # JOB 1 - Build, Scan, and Generate Report
  # ----------------------------------------
  build-and-scan:
    name: Build, Scan, and Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f images/secure.Dockerfile \
            -t secure-app:${{ github.sha }} .

      # FIXED: Added 'sudo' so the runner has permission to install the tool
      - name: Install Trivy Native CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      # FIXED: Routing data directly into the reports folder
      - name: Generate SARIF Security Data
        run: |
          mkdir -p reports
          trivy image --format sarif --output reports/trivy-results.sarif secure-app:${{ github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # FIXED: Local execution means the script finds the SARIF file immediately
      - name: Generate Security Report Text File
        run: |
          python reports/report-generator.py

      # FIXED: Uploads your finished report while the pipeline is completely healthy
      - name: Upload Final Security Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: reports/

      - name: Pipeline Summary Banner
        run: |
          echo "========================================="
          echo "   CONTAINER SECURITY PIPELINE DONE"
          echo "========================================="
          echo "✅ Image Build          - Complete"
          echo "✅ Vulnerability Scan   - Complete"
          echo "✅ Security Report      - Generated"
          echo "========================================="

      # FINAL GATE: Now we safely crash the job to block deployment since vulnerabilities exist
      - name: Enforce Security Policy Gates
        run: |
          trivy image --severity CRITICAL,HIGH --exit-code 1 secure-app:${{ github.sha }}

  # ----------------------------------------
  # JOB 2 - Dockerfile Security Lint
  # ----------------------------------------
  dockerfile-lint:
    name: Dockerfile Security Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Hadolint Dockerfile Linter
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: images/secure.Dockerfile
          failure-threshold: error

  # ----------------------------------------
  # JOB 3 - Policy Check
  # ----------------------------------------
  policy-check:
    name: Security Policy Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run policy validation
        run: |
          echo "========================================="
          echo "  SECURITY POLICY VALIDATION"
          echo "========================================="
          python -c "
          import json
          with open('policies/security-policy.json') as f:
              policy = json.load(f)
          print('✅ Policy file loaded successfully')
          rules = policy['security_policy']['rules']
          print(f'✅ Vulnerability thresholds: {rules[\"vulnerability_thresholds\"]}')
          print(f'✅ Approved base images: {rules[\"approved_base_images\"]}')
          print('✅ All policy checks passed!')
          "